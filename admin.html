<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard — Darshil Kishor</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ocean: #1a3a5c;
    --deep-ocean: #0d2137;
    --sky: #e8f4fd;
    --gold: #e8b84b;
    --gold-light: #f5d98b;
    --red: #c0392b;
    --cream: #fdf6e3;
    --sand: #f0e0b8;
    --white: #ffffff;
    --text-dark: #1a2332;
    --text-mid: #3a5068;
    --accent-teal: #2a8fa8;
  }

  /* Custom Cursor */
  * { cursor: none !important; }

  #cursor-outer {
    width: 36px; height: 36px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 99999;
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease, border-color 0.2s, width 0.2s, height 0.2s;
    mix-blend-mode: multiply;
  }
  #cursor-inner {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 99999;
    transform: translate(-50%, -50%);
  }
  #cursor-symbol {
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 99999;
    transform: translate(-50%, -50%) scale(0);
    font-size: 20px;
    transition: transform 0.2s ease;
  }
  body:has(a:hover) #cursor-outer,
  body:has(button:hover) #cursor-outer {
    width: 54px; height: 54px;
    border-color: var(--red);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--text-dark);
    font-family: 'Crimson Text', Georgia, serif;
    overflow-x: hidden;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--sand); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 60px;
    background: rgba(253, 246, 227, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(232, 184, 75, 0.3);
  }
  .nav-logo {
    font-family: 'Cinzel', serif;
    font-size: 18px; font-weight: 700;
    color: var(--ocean);
    letter-spacing: 2px;
  }
  .nav-logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 34px; list-style: none; }
  .nav-links a {
    font-family: 'Cinzel', serif; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-mid); text-decoration: none;
    position: relative; padding-bottom: 4px;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--ocean); }

  /* ── ADMIN MESSAGES ── */
  section { padding: 120px 0 100px; min-height: 100vh; background: var(--cream); }
  .section-inner { max-width: 1200px; margin: 0 auto; padding: 0 60px; }

  .section-label {
    font-family: 'Cinzel', serif; font-size: 10px;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::before {
    content: ''; display: block; width: 30px; height: 1px; background: var(--gold);
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 700; color: var(--ocean);
    line-height: 1.1; margin-bottom: 50px;
  }

  .messages-grid {
    display: flex; flex-direction: column; gap: 24px;
  }

  .message-card {
    background: white;
    border: 1px solid rgba(26,58,92,0.1);
    border-radius: 12px; padding: 28px;
    transition: all 0.3s ease; position: relative;
    box-shadow: 0 4px 15px rgba(26,58,92,0.05);
  }
  .message-card::before {
    content: '';
    position: absolute; top: 0; left: 0; bottom: 0; width: 4px;
    background: var(--gold);
    border-radius: 12px 0 0 12px;
  }
  .message-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(26,58,92,0.1); }

  .msg-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    border-bottom: 1px solid rgba(26,58,92,0.08);
    padding-bottom: 16px; margin-bottom: 16px;
  }
  .msg-info h3 {
    font-family: 'Cinzel', serif; font-size: 18px; color: var(--ocean); margin-bottom: 4px;
  }
  .msg-info p {
    font-family: 'Crimson Text', serif; font-size: 14px; color: var(--text-mid);
  }
  .msg-date {
    font-family: 'Cinzel', serif; font-size: 10px; color: var(--text-mid);
    letter-spacing: 1px; background: var(--sky); padding: 4px 10px; border-radius: 20px;
  }

  .msg-subject {
    font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; color: var(--ocean);
    margin-bottom: 12px;
  }
  .msg-body {
    font-size: 16px; color: var(--text-dark); line-height: 1.6;
    white-space: pre-wrap;
  }
  .message-card.unread {
    border-color: rgba(232, 184, 75, 0.4);
    box-shadow: 0 4px 15px rgba(232, 184, 75, 0.1);
  }
  .message-card.unread::before {
    background: var(--red);
  }
  .msg-actions {
    display: flex; gap: 10px; margin-top: 20px;
    border-top: 1px solid rgba(26,58,92,0.08); padding-top: 16px;
  }
  .btn-action {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px;
    padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;
    transition: all 0.2s ease; text-transform: uppercase;
  }
  .btn-read { background: var(--sky); color: var(--ocean); border: 1px solid rgba(26,58,92,0.1); }
  .btn-read:hover { background: var(--ocean); color: white; }
  .btn-delete { background: #fce4e4; color: var(--red); border: 1px solid rgba(192,57,43,0.2); }
  .btn-delete:hover { background: var(--red); color: white; }

  .no-messages {
    text-align: center;
    font-family: 'Cinzel', serif; font-size: 18px;
    color: var(--text-mid); margin-top: 60px;
  }

  /* ── FOOTER ── */
  footer {
    background: var(--deep-ocean); color: rgba(255,255,255,0.5);
    padding: 40px 60px; text-align: center;
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px;
  }
  footer .footer-name { color: var(--gold); }

  #onepiece-cursor {
    position: fixed; pointer-events: none; z-index: 99998;
    font-size: 28px; transform: translate(10px, 10px);
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }
  /* ── LOGIN OVERLAY ── */
  #login-overlay {
    position: fixed; inset: 0; z-index: 99999;
    background: linear-gradient(160deg, var(--deep-ocean) 0%, #0d3a6e 60%, #1a5a2e 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
  }
  #login-overlay.hidden { display: none; }
  .login-box {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(232,184,75,0.3);
    border-radius: 16px;
    padding: 48px 56px;
    text-align: center;
    backdrop-filter: blur(10px);
    max-width: 420px; width: 90%;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }
  .login-skull { font-size: 56px; margin-bottom: 12px; }
  .login-title {
    font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700;
    color: var(--gold); margin-bottom: 6px;
  }
  .login-sub {
    font-size: 14px; color: rgba(255,255,255,0.5);
    margin-bottom: 28px;
  }
  .login-input {
    width: 100%; padding: 14px 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(232,184,75,0.3);
    border-radius: 8px; color: white;
    font-family: 'Cinzel', serif; font-size: 14px;
    letter-spacing: 4px; text-align: center;
    outline: none; margin-bottom: 16px;
    transition: border-color 0.3s;
  }
  .login-input:focus { border-color: var(--gold); }
  .login-btn {
    width: 100%; padding: 14px;
    background: var(--gold); color: var(--deep-ocean);
    border: none; border-radius: 8px;
    font-family: 'Cinzel', serif; font-size: 12px;
    font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: all 0.3s;
  }
  .login-btn:hover { background: var(--gold-light); transform: translateY(-2px); }
  .login-error {
    color: #ff6b6b; font-size: 13px;
    margin-top: 12px; min-height: 18px;
  }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-skull">☠️</div>
    <div class="login-title">Captain's Den</div>
    <div class="login-sub">Enter the secret password to access your admin log</div>
    <input id="login-username" class="login-input" type="text" placeholder="USERNAME" style="letter-spacing:2px;margin-bottom:10px;" />
    <input id="login-password" class="login-input" type="password" placeholder="••••••••" />
    <button class="login-btn" onclick="attemptLogin()">Board the Ship</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Custom cursor elements -->
<div id="cursor-outer"></div>
<div id="cursor-inner"></div>
<div id="onepiece-cursor">🏴‍☠️</div>

<!-- NAV -->
<nav>
  <div class="nav-logo">D<span>K</span> - ADMIN VIEW</div>
  <ul class="nav-links">
    <li><a href="index.html">Back to Main</a></li>
  </ul>
</nav>

<section id="admin">
  <div class="section-inner">
    <div class="section-label">Captain's Log</div>
    <h2 class="section-title">Messages Received</h2>
    
    <div id="messagesContainer" class="messages-grid">
      <div class="no-messages">Loading messages...</div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>Admin Page &nbsp;·&nbsp; <span class="footer-name">Darshil Kishor</span> &nbsp;·&nbsp; ⚓ 2025</p>
</footer>

<script>
// ── Admin Auth ──
let ADMIN_TOKEN = sessionStorage.getItem('adminToken');

async function attemptLogin() {
  const username = document.getElementById('login-username').value;
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  try {
    const res = await fetch('/api/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      ADMIN_TOKEN = data.token;
      sessionStorage.setItem('adminToken', ADMIN_TOKEN);
      document.getElementById('login-overlay').classList.add('hidden');
      fetchMessages();
    } else {
      errEl.textContent = 'Wrong password, Pirate! Try again.';
    }
  } catch {
    errEl.textContent = 'Server error. Is the ship running?';
  }
}

// Allow Enter key on password field
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptLogin();
});

// Check if already logged in
if (ADMIN_TOKEN) {
  document.getElementById('login-overlay').classList.add('hidden');
  fetchMessages();
}

// ── Custom Cursor ──
const outer = document.getElementById('cursor-outer');
const inner = document.getElementById('cursor-inner');
const opCursor = document.getElementById('onepiece-cursor');
document.addEventListener('mousemove', e => {
  outer.style.left = e.clientX + 'px'; outer.style.top = e.clientY + 'px';
  inner.style.left = e.clientX + 'px'; inner.style.top = e.clientY + 'px';
  opCursor.style.left = e.clientX + 'px'; opCursor.style.top = e.clientY + 'px';
});

// Fetch Messages
async function fetchMessages() {
  const container = document.getElementById('messagesContainer');
  try {
    const res = await fetch('/api/messages', {
      headers: { 'x-admin-token': ADMIN_TOKEN }
    });
    const messages = await res.json();
    
    if (messages.length === 0) {
      container.innerHTML = '<div class="no-messages">No messages received yet.</div>';
      return;
    }

    container.innerHTML = '';
    messages.forEach(msg => {
      const date = new Date(msg.createdAt).toLocaleString();
      
      const card = document.createElement('div');
      card.className = msg.read ? 'message-card' : 'message-card unread';
      card.innerHTML = `
        <div class="msg-header">
          <div class="msg-info">
            <h3>${msg.name}</h3>
            <p>${msg.email}</p>
          </div>
          <div class="msg-date">${date}</div>
        </div>
        <div class="msg-subject">${msg.subject}</div>
        <div class="msg-body">${msg.message}</div>
        <div class="msg-actions">
          ${!msg.read ? `<button class="btn-action btn-read" onclick="markAsRead('${msg._id}')">Mark as Read</button>` : ''}
          <button class="btn-action btn-delete" onclick="deleteMessage('${msg._id}')">Delete</button>
        </div>
      `;
      container.appendChild(card);
    });
  } catch (err) {
    console.error(err);
    container.innerHTML = '<div class="no-messages">Failed to load messages. Is the server running?</div>';
  }
}

async function markAsRead(id) {
  try {
    await fetch('/api/messages/' + id + '/read', { method: 'PATCH', headers: { 'x-admin-token': ADMIN_TOKEN } });
    fetchMessages();
  } catch (err) {
    console.error('Error marking as read', err);
  }
}

async function deleteMessage(id) {
  if (!confirm('Are you sure you want to delete this message?')) return;
  try {
    await fetch('/api/messages/' + id, { method: 'DELETE', headers: { 'x-admin-token': ADMIN_TOKEN } });
    fetchMessages();
  } catch (err) {
    console.error('Error deleting message', err);
  }
}

fetchMessages();
</script>
</body>
</html>
